<section class="contacto-section">

  <div class="contacto-header">
    <span class="contacto-eyebrow">Estamos aquí para ayudarte</span>
    <h2 class="contacto-title">Solicita tu Presupuesto</h2>
    <div class="header-accent"></div>
    <p class="contacto-subtitle">Rellena el formulario o escríbenos directamente por WhatsApp.</p>
  </div>

  <div class="contacto-grid">

    <!-- Columna del formulario -->
    <div class="form-card">
      <div class="form-card-inner">
        <h3 class="form-card-title">Cuéntanos tu proyecto</h3>
        <form (ngSubmit)="enviarFormulario()" #contactForm="ngForm">

          <div class="field-group">
            <label for="nombreEmpresa">Nombre de empresa o cliente</label>
            <input type="text" id="nombreEmpresa" name="nombreEmpresa"
              [(ngModel)]="formData.nombreEmpresa" required
              placeholder="Tu empresa o nombre">
          </div>

          <div class="field-row">
            <div class="field-group">
              <label for="telefono">Teléfono de contacto</label>
              <input type="tel" id="telefono" name="telefono"
                [(ngModel)]="formData.telefono" required
                pattern="[0-9]{9}" placeholder="600 000 000">
            </div>
            <div class="field-group">
              <label for="email">Correo electrónico</label>
              <input type="email" id="email" name="email"
                [(ngModel)]="formData.email" required
                placeholder="correo@empresa.com">
            </div>
          </div>

          <div class="field-row">
            <div class="field-group">
              <label for="tipoLimpieza">Tipo de limpieza</label>
              <select id="tipoLimpieza" name="tipoLimpieza"
                [(ngModel)]="formData.tipoLimpieza" required>
                <option value="" disabled selected>Selecciona un servicio</option>
                <option value="Limpieza de cristales">Limpieza de cristales</option>
                <option value="Limpieza de fachada">Limpieza de fachada</option>
                <option value="Limpieza de rótulos">Limpieza de rótulos</option>
                <option value="Limpieza de toldos">Limpieza de toldos</option>
                <option value="Otro">Otro</option>
              </select>
            </div>
            <div class="field-group">
              <label for="periodicidad">Periodicidad</label>
              <select id="periodicidad" name="periodicidad"
                [(ngModel)]="formData.periodicidad" required>
                <option value="" disabled selected>¿Con qué frecuencia?</option>
                <option value="Una Vez">Una vez</option>
                <option value="Semanal">Semanal</option>
                <option value="Quincenal">Quincenal</option>
                <option value="Mensual">Mensual</option>
                <option value="Bimestral">Bimestral</option>
                <option value="Trimestral">Trimestral</option>
                <option value="Semestral">Semestral</option>
                <option value="Anual">Anual</option>
              </select>
            </div>
          </div>

          <div class="field-group">
            <label for="observaciones">Observaciones</label>
            <textarea id="observaciones" name="observaciones"
              [(ngModel)]="formData.observaciones"
              rows="3" placeholder="Cuéntanos más detalles sobre el trabajo..."></textarea>
          </div>

          <button class="btn-submit" type="submit" [disabled]="!contactForm.valid || isLoading">
            <span *ngIf="isLoading" class="btn-spinner">
              <svg width="18" height="18" viewBox="0 0 50 50">
                <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5"
                  stroke-linecap="round" stroke-dasharray="31.4 31.4"
                  transform="rotate(-90 25 25)">
                  <animateTransform attributeName="transform" type="rotate"
                    from="0 25 25" to="360 25 25" dur="1s" repeatCount="indefinite" />
                </circle>
              </svg>
            </span>
            <span>{{ isLoading ? 'Enviando...' : 'Enviar solicitud' }}</span>
          </button>

        </form>
      </div>
    </div>

    <!-- Columna WhatsApp -->
    <div class="whatsapp-card">
      <div class="whatsapp-card-inner">
        <div class="whatsapp-icon-wrap">
          <img src="assets/icons/whatsapp.svg" alt="WhatsApp" class="whatsapp-icon">
        </div>
        <h3 class="whatsapp-title">¿Prefieres hablar directamente?</h3>
        <p class="whatsapp-text">Escríbenos por WhatsApp y te atendemos personalmente.</p>
        <button class="btn-whatsapp" (click)="redirigirWhatsapp()">
          <img src="assets/icons/whatsapp.svg" alt="" class="btn-wa-icon">
          Contactar por WhatsApp
        </button>
        <div class="whatsapp-divider"></div>
        <ul class="whatsapp-perks">
          <li>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Presupuesto sin compromiso
          </li>
          <li>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Atención personalizada
          </li>
        </ul>
      </div>
    </div>

  </div>
</section>
